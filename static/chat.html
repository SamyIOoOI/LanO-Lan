<!DOCTYPE html>
    <head><link rel="stylesheet" href="Settings/layout.css?v=<?php echo time(); ?>"><meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LanO'Lan</title>
    </head>
    <body>
        <h1>LanO'Lan Chat</h1>
        <h2>Logged in as: <span id="ws-id" style="color: lightskyblue"></span></h2>
        <form action="" onsubmit="sendMessage(event)">
            <input type="text" id="messageText" autocomplete="off"/>
            <button>Send</button>
        </form>
        <button onclick="clearchat()">Clear Chat</button>
        <div class='scroll'>
            <ul id='messages'>
            </ul>
        </div>
        <select id="files" name="Files"></select>
        <div class="downup">
            <button onclick="downloadFile()">Download</button>
            <div id='indicatorstat' class="indicator" style="background-color: green;">Status</div>
            <button onclick="uploadFile()">Upload File</button>
        </div>
        <h3 class="h3mob">Currently Online</h3>
        <div class="sidepanel">
            <h3 class="h3pc">Currently Online</h3>
            <ul id="online-users"></ul>
        </div>
        <script>
            if (!sessionStorage.getItem('token')){
                alert("You need to be logged in to access the chat!")
                window.location.href = "/"
            }
            var client_id = Date.now()
            document.querySelector('.scroll').scrollTop = 0
            const scrollDiv = document.querySelector('.scroll')
            const selectElement = document.getElementById('files')
            const token = sessionStorage.getItem('token')
            document.querySelector("#ws-id").textContent = token;
            var ws;
            (async function() {
                const info = await fetch('/info').then(r => r.json())
                const ipv4 = info.ipv4
                const port = info.port
                ws = new WebSocket(`ws://${ipv4}:${port}/ws/${client_id}?token=${token}`);
                repopulatefiles()
                joinSound()
                ws.onmessage = function(event) {
                    if (event.data.startsWith("FILE_ADD:")) {
                        const filename = event.data.split(":")[1]
                        const newOption = new Option(filename, filename)
                        selectElement.add(newOption)
                        uploadsound()
                        var messages = document.getElementById('messages')
                        var message = document.createElement('li')
                        message.innerHTML = "A new <span style='color: blue;'>File</span> was uploaded!"
                        messages.appendChild(message)
                        scrollDiv.scrollTop = scrollDiv.scrollHeight
                    } 
                    else if (event.data.startsWith("User_List:")) {
                        const users = JSON.parse(event.data.split(":")[1])
                        const onlineuserslist = document.getElementById('online-users')
                        onlineuserslist.innerHTML = ''
                        users.forEach(user => {
                            const listItem = document.createElement('li')
                            listItem.textContent = user
                            listItem.onclick = function() {
                                alert(`Coming Soon!`)
                            }
                            listItem.style.cursor = 'pointer'
                            onlineuserslist.appendChild(listItem)
                        })
                    }
                    else if (event.data.startsWith("Upload_Status")) {
                        const uplstat = event.data.split(":")[1]
                        const elem = document.getElementById('indicatorstat')
                        if (uplstat == 'yellow') {
                            elem.style.setProperty('background-color', 'yellow')
                        }
                        else if (uplstat == 'red') {
                            elem.style.setProperty('background-color', 'red')
                        }
                        else {
                            elem.style.setProperty('background-color', 'green')
                        }
                    }
                    else {
                        var messages = document.getElementById('messages')
                        var message = document.createElement('li')
                        message.innerHTML = event.data
                        smessagesound()
                        messages.appendChild(message)
                        scrollDiv.scrollTop = scrollDiv.scrollHeight
                    }
                };
            })()
            function sendMessage(event) {
                var input = document.getElementById("messageText")
                ws.send(input.value)
                input.value = ''
                event.preventDefault()
            }
            function clearchat() {
                document.getElementById('messages').innerHTML = ''
                scrollDiv.scrollTop = scrollDiv.scrollHeight
                cchatsound()
            }
            async function downloadFile(){
                const filename = selectElement.value
                await repopulatefiles()
                const fileok = Array.from(selectElement.options).some(option => option.value === filename)
                if (fileok) {
                    downloadsound()
                    window.location.href = `/download/${filename}`
                }
                else {
                    alert('File was not found!')
                    repopulatefiles()
                }
            }
            function repopulatefiles(){
                return fetch('/files').then(r => r.json()).then(data => {
                    selectElement.innerHTML = ''
                    data.files.forEach(file => {
                        const newOption = new Option(file, file)
                        selectElement.add(newOption)
                    })
                })
            }
            function uploadFile() {
                const special = confirm("Should this file persist in the server for the maximum duration of 7 hours? (else it'll only remain based on its size.)")
                const input = document.createElement('input')
                input.type = 'file'
                input.accept = '*/*'
                input.onchange = async function() {
                    const formData = new FormData()
                    formData.append('file', input.files[0])
                    formData.append('special', special)
                    await fetch('/uploadfiles/', {
                        method: 'POST',
                        body: formData
                    })
                }
                input.click()
            }
            function smessagesound() {
                const audio = new Audio("/Settings/Sounds/message.wav");
                audio.play().catch(error => console.log(error));
            }
            function joinSound() {
                const audio2 = new Audio("/Settings/Sounds/join.wav");
                audio2.play().catch(error => console.log(error));
            }
            function cchatsound() {
                const audio3 = new Audio("/Settings/Sounds/cchat.wav");
                audio3.play().catch(error => console.log(error));
            }
            function uploadsound() {
                const audio4 = new Audio("/Settings/Sounds/upload.mp3");
                audio4.play().catch(error => console.log(error));
            }
            function downloadsound() {
                const audio5 = new Audio("/Settings/Sounds/download.wav");
                audio5.play().catch(error => console.log(error));
            }
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        </script>
    </body>
</html>
