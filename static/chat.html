<!DOCTYPE html>
    <head><link rel="stylesheet" href="Settings/layout.css?v=<?php echo time(); ?>"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" sizes="any">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<meta name="apple-mobile-web-app-title" content="Lan O'Lan" />
<link rel="manifest" href="/static/site.webmanifest" />
        <title>LanO'Lan</title>
    </head>
    <body>
        <h1>LanO'Lan Chat</h1>
        <h2>Logged in as: <span id="ws-id" style="color: lightskyblue"></span></h2>
        <form action="" onsubmit="sendMessage(event)">
            <input type="text" id="messageText" autocomplete="off"/>
            <button>Send</button>
        </form>
        <button onclick="clearchat()">Clear Chat</button>
        <div class='scroll'>
            <ul id='messages'>
            </ul>
        </div>
        <select id="files" name="Files"></select>
        <div class="downup">
            <button onclick="downloadFile()">Download</button>
            <div id='indicatorstat' class="indicator" style="background-color: green;">Status</div>
            <button onclick="uploadFile()">Upload File</button>
        </div>
        <h3 class="h3mob">Currently Online</h3>
        <div class="sidepanel">
            <h3 class="h3pc">Currently Online</h3>
            <ul id="online-users"></ul>
        </div>
        <div class="vcvid" id="vc">
            <div class="audiocontrol">
            <audio id="remote-audio" autoplay controls></audio>
            </div>
            <div class=mainvidbtn>
            <div class="videobtn">
            <button onclick="videobtn()">Toggle Video</button>
            </div>
            <div class="endcallbtn">
            <button onclick="endcall()">End Call</button>
            </div>
            </div>
            <div class="videos">
            <div class="revideo">
            <h4>Remote Video</h4>
            <video id='remote-video' autoplay></video>
            </div>
            <div class="lovideo">
            <h5>Local Video</h5>
            <video id='local-video' autoplay muted style="display: none;"></video>
            </div>
            </div>
        </div>
        <footer class="footer">Made by SamyIOoOI (Samy0_o) on github under MIT licence (2026-2027).</footer>
        <script>
            document.getElementsByClassName('vcvid')[0].style.display = 'none'
            let videoison = false
            let localStream;
            let camera;
            let connection; 
            let currentCall = null
            if (!sessionStorage.getItem('token')){
                alert("You need to be logged in to access the chat!")
                window.location.href = "/"
            }
            var client_id = Date.now()
            document.querySelector('.scroll').scrollTop = 0
            const scrollDiv = document.querySelector('.scroll')
            const selectElement = document.getElementById('files')
            const token = sessionStorage.getItem('token')
            document.querySelector("#ws-id").textContent = token;
            var ws;
            (async function() {
                const info = await fetch('/info').then(r => r.json())
                const ipv4 = info.ipv4
                const port = info.port
                ws = new WebSocket(`wss://${ipv4}:${port}/ws/${client_id}?token=${token}`);
                repopulatefiles()
                joinSound()
                ws.onmessage = async function(event) {
                    if (event.data.startsWith("FILE_ADD:")) {
                        const filename = event.data.split(":")[1]
                        const newOption = new Option(filename, filename)
                        selectElement.add(newOption)
                        uploadsound()
                        var messages = document.getElementById('messages')
                        var message = document.createElement('li')
                        message.innerHTML = "A new <span style='color: blue;'>File</span> was uploaded!"
                        messages.appendChild(message)
                        scrollDiv.scrollTop = scrollDiv.scrollHeight
                    } 
                    else if (event.data.startsWith("User_List:")) {
                        const users = JSON.parse(event.data.split(":")[1])
                        const onlineuserslist = document.getElementById('online-users')
                        onlineuserslist.innerHTML = ''
                        users.forEach(user => {
                            const listItem = document.createElement('li')
                            listItem.textContent = user
                            listItem.onclick = function() {
                                calluser(user)
                            }
                            listItem.style.cursor = 'pointer'
                            onlineuserslist.appendChild(listItem)
                        })
                    }
                    else if (event.data.startsWith("Upload_Status")) {
                        const uplstat = event.data.split(":")[1]
                        const elem = document.getElementById('indicatorstat')
                        if (uplstat == 'yellow') {
                            elem.style.setProperty('background-color', 'yellow')
                        }
                        else if (uplstat == 'red') {
                            elem.style.setProperty('background-color', 'red')
                        }
                        else {
                            elem.style.setProperty('background-color', 'green')
                        }
                    }
                    else if (event.data.startsWith("CALL_REQUEST:")) {
                        const caller = event.data.split(":")[1]
                        const response = confirm(`User ${caller} has invited you to a call. Connect?`)
                        currentCall = caller
                        if (response) {
                            connection = new RTCPeerConnection({iceServers: []})
                            await startAudio()
                            ws.send(`CALL_ACCEPT:${caller}`)
                            document.getElementsByClassName('vcvid')[0].style.display = 'flex'
                            connection.onicecandidate = function(event) {
                                if (event.candidate) {
                                    ws.send(`ICE:${caller}:${JSON.stringify(event.candidate)}`)
                                }
                            }
                            connection.ontrack = function(event) {
                                if (event.track.kind === 'audio'){
                                    document.getElementById('remote-audio').srcObject = event.streams[0]
                                    document.getElementById('remote-audio').play().catch(error => console.log(error))
                                }
                                else if (event.track.kind === 'video') {
                                    document.getElementById('remote-video').srcObject = event.streams[0]
                                    document.getElementById('remote-video').style.display = 'block'
                                    document.getElementById('remote-video').play().catch(error => console.log(error))
                                }
                            }
                            }
                        else {
                            ws.send(`CALL_REJECT:${caller}`)
                        }
                        }
                    else if (event.data.startsWith("CALL_REJECT:")) {
                        document.getElementsByClassName('vcvid')[0].style.display = 'none'
                        if (connection) {
                        alert("Call Declined!")
                        connection = null
                        currentCall = null
                    }
                    }
                    else if (event.data.startsWith("ICE:")) {
                        const parts = event.data.split(":")
                        const candidate = JSON.parse(parts.slice(2).join(":"))
                        connection.addIceCandidate(candidate).catch(error => console.log(error))
                    }
                    else if (event.data.startsWith("CALL_ACCEPT:")) {
                        const parts = event.data.split(":")
                        const offer = await connection.createOffer()
                        await connection.setLocalDescription(offer)
                        ws.send(`OFFER:${parts[1]}:${JSON.stringify(offer)}`)
                    }
                    else if (event.data.startsWith("OFFER:")) {
                        const parts = event.data.split(":")
                        const from = parts[1]
                        const offer = JSON.parse(event.data.split(":").slice(2).join(":"))
                        await connection.setRemoteDescription(new RTCSessionDescription(offer))
                        const answer = await connection.createAnswer()
                        await connection.setLocalDescription(answer)
                        ws.send(`ANSWER:${from}:${JSON.stringify(answer)}`)

                    }
                    else if (event.data.startsWith("ANSWER:")) {
                        const parts = event.data.split(":")
                        const from = parts[1]
                        const answer = JSON.parse(event.data.split(":").slice(2).join(":"))
                        await connection.setRemoteDescription(new RTCSessionDescription(answer))
                    }
                    else if (event.data.startsWith("CALL_END:")){
                        alert("The call has been ended by the other user.")
                        endcall2()
                    }
                    else {
                        var messages = document.getElementById('messages')
                        var message = document.createElement('li')
                        message.innerHTML = event.data
                        smessagesound()
                        messages.appendChild(message)
                        scrollDiv.scrollTop = scrollDiv.scrollHeight
                    }
                };
            })()
            function sendMessage(event) {
                var input = document.getElementById("messageText")
                ws.send(input.value)
                input.value = ''
                event.preventDefault()
            }
            function clearchat() {
                document.getElementById('messages').innerHTML = ''
                scrollDiv.scrollTop = scrollDiv.scrollHeight
                cchatsound()
            }
            async function downloadFile(){
                const selectedDownloadIndex = selectElement.selectedIndex
                if (selectedDownloadIndex === -1){
                    alert('No File Selected!')
                    return
                }
                const filename = selectElement.options[selectedDownloadIndex].value
                if (!filename){
                    alert('File does not exist!')
                    return
                }
                const link = document.createElement('a')
                link.href = `/download/${filename}`
                link.download = filename
                document.body.appendChild(link)
                link.click()
                document.body.removeChild(link)
                downloadsound()
            }
            function repopulatefiles(){
                return fetch('/files').then(r => r.json()).then(data => {
                    selectElement.innerHTML = ''
                    data.files.forEach(file => {
                        const newOption = new Option(file, file)
                        selectElement.add(newOption)
                    })
                })
            }
            async function uploadFile() {
                const special = confirm("Should this file persist in server storage for the maximum duration?")
                const input = document.createElement('input')
                input.type = 'file'
                input.accept = '*/*'
                input.onchange = async function() {
                    const file = input.files[0] 
                    const filesizeMB = file.size / (1024 * 1024)
                    const availablesize_fetch = await fetch('/available')
                    const availablesize_json = await availablesize_fetch.json()
                    const availablesize = availablesize_json.max_upload
                    if (filesizeMB > availablesize) {
                        alert("File too large! It exceeds the space available in the host server!");
                        return;
                    } 
                    const formData = new FormData()
                    formData.append('file', input.files[0])
                    formData.append('special', special)
                    await fetch('/uploadfiles/', {
                        method: 'POST',
                        body: formData
                    })
                }
                input.click()
            }
            function smessagesound() {
                const audio = new Audio("/Settings/Sounds/message.wav");
                audio.play().catch(error => console.log(error));
            }
            function joinSound() {
                const audio2 = new Audio("/Settings/Sounds/join.wav");
                audio2.play().catch(error => console.log(error));
            }
            function cchatsound() {
                const audio3 = new Audio("/Settings/Sounds/cchat.wav");
                audio3.play().catch(error => console.log(error));
            }
            function uploadsound() {
                const audio4 = new Audio("/Settings/Sounds/upload.mp3");
                audio4.play().catch(error => console.log(error));
            }
            function downloadsound() {
                const audio5 = new Audio("/Settings/Sounds/download.wav");
                audio5.play().catch(error => console.log(error));
            }
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            async function calluser(username) {
                currentCall = username
                const config = {
                    iceServers: []
                }
                connection = new RTCPeerConnection(config);
                document.getElementsByClassName('vcvid')[0].style.display = 'flex'
                await startAudio()
                connection.onicecandidate = function(event) {
                    if (event.candidate) {
                        ws.send(`ICE:${username}:${JSON.stringify(event.candidate)}`)
                    }
                }
                connection.ontrack = function(event) {
                    if (event.track.kind === 'audio'){
                    document.getElementById('remote-audio').srcObject = event.streams[0]
                    document.getElementById('remote-audio').play().catch(error => console.log(error))
                    }
                    else if (event.track.kind === 'video') {
                    document.getElementById('remote-video').srcObject = event.streams[0]
                    document.getElementById('remote-video').style.display = 'block'
                    document.getElementById('remote-video').play().catch(error => console.log(error))
                    }
                }
                ws.send(`CALL_REQUEST:${username}`)
                }
            async function startAudio(){
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true});
                localStream.getTracks().forEach(track => connection.addTrack(track, localStream));
            }
            async function videobtn() {
                if (!videoison){
                    const videostream = await navigator.mediaDevices.getUserMedia({video: true})
                    camera = videostream.getVideoTracks()[0]
                    connection.addTrack(camera, videostream)
                    const offer = await connection.createOffer()
                    await connection.setLocalDescription(offer)
                    ws.send(`OFFER:${currentCall}:${JSON.stringify(offer)}`)
                    document.getElementById('local-video').srcObject = videostream
                    document.getElementById('local-video').style.display = 'block'
                    videoison = true
                }
                else {
                    connection.removeTrack(connection.getSenders().find(sender => sender.track === camera))
                    camera.stop()
                    document.getElementById('local-video').style.display = 'none'
                    videoison = false
                }
            }
            function endcall() {
                if (connection) {
                    connection.close()
                    connection = null
                }
                if (localStream){
                    localStream.getTracks().forEach(track => track.stop())
                    localStream = null
                }
                if (camera) {
                    camera.stop()
                    camera = null
                }
                document.getElementById('remote-audio').srcObject = null
                document.getElementById('remote-video').srcObject = null 
                document.getElementById('local-video').srcObject = null
                document.getElementsByClassName('vcvid')[0].style.display = 'none'
                videoison = false
                ws.send(`CALL_END:${currentCall}`)
                currentCall = null
            }
            function endcall2() {
                if (connection) {
                    connection.close()
                    connection = null
                }
                if (localStream){
                    localStream.getTracks().forEach(track => track.stop())
                    localStream = null
                }
                if (camera) {
                    camera.stop()
                    camera = null
                }
                document.getElementById('remote-audio').srcObject = null
                document.getElementById('remote-video').srcObject = null 
                document.getElementById('local-video').srcObject = null
                document.getElementsByClassName('vcvid')[0].style.display = 'none'
                videoison = false
                currentCall = null
            }
        </script>
    </body>
</html>
