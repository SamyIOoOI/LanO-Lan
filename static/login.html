<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="Settings/layout.css?v=<?php echo time(); ?>"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanO'Lan</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" sizes="any">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="manifest" href="/static/site.webmanifest" />
</head>
<body style="background-color: #BB010E;">
    <img src="/static/banner.gif" alt="Lan O'Lan Logo">
    <h1>Login</h1>
    <form onsubmit="login(event)">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <button type="submit">Login</button>
    </form>
    <footer class="footer">
        Made by SamyIOoOI (Samy0_o) on github under MIT licence (2026-2027).
    </footer>
    <script>
        async function login(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const response = await fetch("/token", {
                method:'POST',
                body: formData
            })
            const data = await response.json()
            if (!response.ok){
                alert("Invalid username or password")
                return
            }
            sessionStorage.setItem('token', data.access_token)
            window.location.href = "/chat"
        }
    </script>
</body>
</html>
